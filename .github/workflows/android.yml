name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3 python3-pip python3-setuptools python3-wheel \
            git zip unzip \
            openjdk-17-jdk \
            build-essential autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libffi-dev libssl-dev \
            cmake \
            libsqlite3-dev liblzma-dev

      - name: Install Python build tools
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade buildozer cython

      - name: Prepare Android SDK and accept licenses (HARD FAIL if not found)
        shell: bash
        run: |
          set -euxo pipefail

          # 1) Haz que buildozer prepare el árbol Android (descarga SDK/NDK)
          buildozer android update || true

          SDKROOT="$HOME/.buildozer/android/platform/android-sdk"
          echo "SDKROOT=$SDKROOT"
          ls -la "$SDKROOT" || true

          # 2) Encuentra sdkmanager sí o sí
          SDKM="$(find "$SDKROOT" -type f -path '*cmdline-tools*bin/sdkmanager' | head -n 1 || true)"
          if [ -z "$SDKM" ]; then
            echo "ERROR: sdkmanager no encontrado dentro de $SDKROOT"
            find "$SDKROOT" -maxdepth 4 -type d -print || true
            exit 1
          fi

          echo "Using sdkmanager: $SDKM"

          # 3) Acepta licencias (sin interacción)
          yes | "$SDKM" --sdk_root="$SDKROOT" --licenses

          # 4) Instala explícitamente platform-tools y build-tools ESTABLES (con aidl)
          yes | "$SDKM" --sdk_root="$SDKROOT" "platform-tools" "build-tools;34.0.0"

          # 5) Verifica que existe aidl
          test -x "$SDKROOT/build-tools/34.0.0/aidl"
          "$SDKROOT/build-tools/34.0.0/aidl" --version || true

      - name: Build APK (Buildozer)
        run: |
          buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bin/*.apk
